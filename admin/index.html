<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理首页 - 时雨绘华的博客</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-blog"></i>
                <span>博客管理系统</span>
            </div>
            <nav class="sidebar-nav">
                <a href="about.html" class="nav-item active">
                    <i class="fas fa-user-edit"></i>
                    <span>个人管理</span>
                </a>
                <a href="articles.html" class="nav-item">
                    <i class="fas fa-file-alt"></i>
                    <span>文章管理</span>
                </a>
                <a href="videos.html" class="nav-item">
                    <i class="fas fa-video"></i>
                    <span>视频管理</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" target="_blank" class="btn btn-outline btn-sm">
                    <i class="fas fa-external-link-alt"></i>
                    查看前台
                </a>
                <a href="../login.html" class="btn btn-danger btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    退出登录
                </a>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1>控制台</h1>
                <div class="admin-user">
                    <span><i class="fas fa-user-circle"></i> 管理员</span>
                </div>
            </header>

            <div class="admin-content">
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #667eea;">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="articleCount">0</h3>
                            <p>文章总数</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #f093fb;">
                            <i class="fas fa-video"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="videoCount">0</h3>
                            <p>视频总数</p>
                        </div>
                    </div>
                </div>

                <div class="quick-actions">
                    <h2>快捷操作</h2>
                    <div class="action-cards">
                        <a href="articles.html?action=new" class="action-card">
                            <i class="fas fa-plus-circle"></i>
                            <h3>发布文章</h3>
                            <p>创建新的博客文章</p>
                        </a>
                        <a href="videos.html?action=new" class="action-card">
                            <i class="fas fa-video"></i>
                            <h3>上传视频</h3>
                            <p>上传新的视频内容</p>
                        </a>
                        <a href="about.html" class="action-card">
                            <i class="fas fa-edit"></i>
                            <h3>编辑资料</h3>
                            <p>更新个人信息</p>
                        </a>
                    </div>
                </div>

                <div class="recent-content">
                    <h2>最近文章</h2>
                    <div class="content-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>标题</th>
                                    <th>分类</th>
                                    <th>日期</th>
                                    <th>阅读量</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="recentArticles">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
