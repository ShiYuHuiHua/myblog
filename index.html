<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时雨绘华的个人博客</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-blog"></i>
                <span>时雨绘华的博客</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">首页</a></li>
                <li><a href="articles.html" class="nav-link">文章</a></li>
                <li><a href="video.html" class="nav-link">视频</a></li>
                <li><a href="about.html" class="nav-link">关于</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- 头部区域 -->
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="avatar-container">
                <img src="头像.jpg" alt="头像" class="avatar">
            </div>
            <h1 class="hero-title">这里是时雨绘华</h1>
            <p class="hero-subtitle">技术宅拯救世界！</p>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 最新文章 -->
        <section class="section">
            <div class="container">
                <h2 class="section-title">
                    <i class="fas fa-fire"></i>
                    最新文章
                </h2>
                <div class="articles-grid" id="articlesContainer">
                </div>
                <div class="text-center">
                    <a href="articles.html" class="btn btn-primary">查看更多文章</a>
                </div>
            </div>
        </section>

        <!-- 视频板块 -->
        <section class="section">
            <div class="container">
                <h2 class="section-title">
                    <i class="fas fa-video"></i>
                    视频作品
                </h2>
                <div class="videos-grid" id="videosContainer">
                </div>
                <div class="text-center" style="margin-top: 2rem;">
                    <a href="#" class="btn btn-primary">查看更多视频</a>
                </div>
            </div>
        </section>

        <!-- 统计数据 -->
        <section class="section section-alt">
            <div class="container">
                <div class="stats-grid">
                    <div class="stat-item">
                        <i class="fas fa-file-alt"></i>
                        <span class="stat-number" id="articleCount">0</span>
                        <span class="stat-label">文章</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-video"></i>
                        <span class="stat-number" id="videoCount">0</span>
                        <span class="stat-label">视频</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-calendar-alt"></i>
                        <span class="stat-number" id="daysCount">0</span>
                        <span class="stat-label">运营天数</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer style="background: #1a1a2e; color: #fff; text-align: center; padding: 1.5rem 0; font-size: 0.9rem;">
        <div class="container">
            <p style="margin: 0; opacity: 0.8;"><a href="https://beian.miit.gov.cn/#/Integrated/index" target="_blank" style="color: inherit; text-decoration: none;">鄂ICP备2025089804号</a></p>
        </div>
    </footer>

    <!-- 返回顶部按钮 -->
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
